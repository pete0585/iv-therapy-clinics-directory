name: Deploy to Vercel
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Deploy to Vercel Production
        run: |
          output=$(npx vercel --prod --yes 2>&1)
          exit_code=$?
          echo "$output"
          if [ $exit_code -ne 0 ]; then
            if echo "$output" | grep -q "api-deployments-free-per-day"; then
              echo "Vercel 100/day rate limit hit — site is already live, skipping."
              exit 0
            fi
            exit $exit_code
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
          VERCEL_PROJECT_ID: prj_sxG3234dI5mXNNzzhNB9fj54hp3c
          VERCEL_ORG_ID: team_aR9r1XG6ieq1J7fAWllOy0LY
